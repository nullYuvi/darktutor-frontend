<!-- ===== profile.html ===== -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>DarkTutor - Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <button id="back-btn" class="back-btn">← Back</button>
      <h1 class="gold">Profile</h1>
    </header>
    <div class="profile-card">
      <img id="profile-avatar" src="https://via.placeholder.com/150" alt="Avatar">
      <h2 id="profile-username"></h2>
      <p id="profile-bio"></p>
      <div class="stats">
        <span>Friends: <span id="profile-friends-count">0</span></span>
        <span>Premium: <span id="profile-premium">No</span></span>
      </div>
      <div id="profile-actions"></div>
    </div>
    <!-- If viewing own profile, show pending requests -->
    <div id="own-pending" style="display: none;">
      <h3>Pending Friend Requests</h3>
      <div id="pending-list"></div>
    </div>
  </div>
  <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
  <script src="profile.js"></script>
</body>
</html>
