<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DarkTutor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Animated background -->
  <div class="space">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <!-- Main card -->
  <div class="card" id="card">
    <h1>Dark<span>Tutor</span></h1>
    <p>Learn • Hack • Secure</p>

    <input type="text" id="username" placeholder="Username">

    <button class="outline" onclick="signupUser()">Signup</button>

    <p id="msg"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
