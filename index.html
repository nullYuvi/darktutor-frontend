<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>DarkTutor</title>

<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body>

<header class="top">
  <span class="logo">DarkTutor</span>
  <input id="search" placeholder="Search username...">
</header>

<div class="layout">
  <aside id="users"></aside>

  <main>
    <div id="chatHeader">Select a user to start chat</div>
    <div id="msgs"></div>

    <div class="send">
      <input id="msg" placeholder="Type message..." disabled>
      <button onclick="send()" disabled id="sendBtn">Send</button>
    </div>
  </main>
</div>

<!-- PROFILE MODAL -->
<div id="profile" class="modal">
  <div class="modalBox">
    <img id="pAvatar">
    <h3 id="pName"></h3>
    <button onclick="closeProfile()">Close</button>
  </div>
</div>

<script src="js/index.js"></script>
</body>
</html>
