<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>DarkTutor Chat</title>

<link rel="stylesheet" href="css/chat.css">

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

</head>

<body>

<div class="chat">

<header class="header">

<div class="left">

<span class="back" onclick="goBack()">←</span>

<img id="chatAvatar" class="avatar">

<div class="user">

<div id="chatName" class="name"></div>

<div id="status" class="status">offline</div>

</div>

</div>

</header>

<div id="msgs" class="messages"></div>

<form class="input-area" onsubmit="send(event)">

<input
id="msg"
placeholder="Message..."
autocomplete="off"
/>

<button type="submit">➤</button>

</form>

</div>

<script src="js/chat.js"></script>

</body>

</html>
