<!DOCTYPE html>
<html>
<head>
  <meta name="viewport"
        content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Chat | DarkTutor</title>

  <!-- CHAT CSS -->
  <link rel="stylesheet" href="./css/chat.css">

  <!-- Socket.io -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body class="chat-body">

  <!-- HEADER -->
  <div class="chat-header">
    <span class="back" onclick="goBack()">←</span>
    <img id="chatAvatar" class="chat-avatar" alt="avatar">
    <span id="chatName" class="chat-name"></span>
  </div>

  <!-- MESSAGES -->
  <div id="msgs" class="chat-messages"></div>

  <!-- ✅ TYPING INDICATOR (MESSAGE KE NICHE, INPUT KE UPAR) -->
  <div id="typing" class="typing"></div>

  <!-- INPUT BAR -->
  <form class="chat-input" onsubmit="send(event)">
    <input
      id="msg"
      placeholder="Message"
      autocomplete="off"
      inputmode="text"
      enterkeyhint="send"
    >
    <button type="submit" aria-label="Send">➤</button>
  </form>

  <!-- CHAT JS -->
  <script src="./js/chat.js"></script>
</body>
</html>
