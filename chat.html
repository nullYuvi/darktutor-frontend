<!DOCTYPE html><html>
<head><meta charset="UTF-8"><meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<title>DarkTutor Chat</title><link rel="stylesheet" href="css/chat.css"><script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script></head><body><canvas id="stars"></canvas>

<div class="chat"><div class="header"><span class="back" onclick="goBack()">←</span>

<img id="chatAvatar" class="avatar"><div class="name">
<span id="chatName"></span>
<span id="status" class="online"></span>
</div></div><div id="typing" class="typing"></div><div id="msgs" class="messages"></div><form class="input-area" onsubmit="send(event)"><input id="msg"
placeholder="Message..."
autocomplete="off"
inputmode="text"
enterkeyhint="send">

<button type="submit">➤</button>

</form></div><script src="js/chat.js"></script></body>
</html>
